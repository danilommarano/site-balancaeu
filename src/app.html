<!doctype html>
<html lang="pt-BR" class="scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
		<script>
			// Aplica o tema escolhido antes do render, evitando flash.
			(function () {
				try {
					var stored = localStorage.getItem('balancaeu-theme');
					var prefDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var resolved = (stored === 'light' || stored === 'dark') ? stored : (prefDark ? 'dark' : 'light');
					document.documentElement.setAttribute('data-theme', resolved);
					if (resolved === 'dark') document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
